        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(135deg, #1a0033, #330033);
            color: white;
            overflow: hidden;
        }
        
        .uno-card {
            width: 280px;
            height: 380px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 8px solid #fff;
            background: white;
            overflow: hidden;
        }
        
        .card-back {
            background: repeating-linear-gradient(
                45deg,
                #000,
                #000 10px,
                #e30613 10px,
                #e30613 20px
            );
        }
        
        .flipping {
            animation: flipCard 1.2s ease forwards;
        }
        
        @keyframes flipCard {
            0% { transform: rotateY(0deg) scale(0.8); }
            50% { transform: rotateY(90deg) scale(0.9); }
            100% { transform: rotateY(0deg) scale(1); }
        }
        
        .neon-text {
            text-shadow: 
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #e30613;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">

                <div onclick="drawTruth()" id="truth-deck"
                     class="mx-auto deck-stack w-[240px] h-[320px] cursor-pointer active:scale-95 transition-all">
                    <div class="relative w-full h-full">
                        <div class="uno-card card-back absolute top-0 left-0 w-[240px] h-[320px]"></div>
                        <div class="uno-card card-back absolute top-3 left-3 w-[240px] h-[320px]"></div>
                    </div>
                </div>

                <button onclick="drawTruth()" 
                        class="w-full bg-red-600 hover:bg-red-700 transition-colors text-white font-bold py-6 text-2xl rounded-3xl shadow-2xl">
                    DRAW +2 TRUTH
                </button>
            </div>

            <!-- DARE SIDE -->
            <div class="space-y-6">
                <div class="text-center">
                    <div class="inline-block bg-purple-600 text-white px-8 py-2 text-xl font-bold rounded-t-3xl">+4 DARE</div>
                </div>
                
                <div onclick="drawDare()" id="dare-deck"
                     class="mx-auto deck-stack w-[240px] h-[320px] cursor-pointer active:scale-95 transition-all">
                    <div class="relative w-full h-full">
                        <div class="uno-card card-back absolute top-0 left-0 w-[240px] h-[320px]"></div>
                        <div class="uno-card card-back absolute top-3 left-3 w-[240px] h-[320px]"></div>
                    </div>
                </div>

                <button onclick="drawDare()" 
                        class="w-full bg-purple-600 hover:bg-purple-700 transition-colors text-white font-bold py-6 text-2xl rounded-3xl shadow-2xl">
                    DRAW +4 DARE
                </button>
            </div>
        </div>

        <!-- Revealed Area -->
        <div id="card-container" class="mt-12 flex justify-center min-h-[420px]">
            <!-- Dynamic card appears here -->
        </div>

        <!-- Result Panel -->
        <div id="result-panel" class="hidden mt-8 bg-black/80 backdrop-blur-xl border-4 border-white rounded-3xl p-8 max-w-2xl mx-auto">
            <div id="effect-type" class="text-4xl font-bold mb-6 text-center"></div>
            <div id="prompt-text" class="text-2xl leading-relaxed text-pink-100 min-h-[160px] italic"></div>
            
            <div class="flex gap-4 mt-10">
                <button onclick="hideResult()" 
                        class="flex-1 border-2 border-white/70 py-5 rounded-2xl font-bold hover:bg-white hover:text-black transition-all">
                    CLOSE
                </button>
                <button onclick="drawAgain()" 
                        class="flex-1 bg-gradient-to-r from-pink-500 to-purple-600 py-5 rounded-2xl font-bold hover:brightness-110">
                    DRAW AGAIN
                </button>
            </div>
        </div>

        <div class="text-center mt-12 text-xs opacity-60">
            VERY NSFW • CONSENSUAL ONLY • NO OBJECTS REQUIRED
        </div>
    </div>

    <script>

            "Show the group your most recent nudes.",
            "What's your most depraved sexual fantasy?",
            "Have you ever cheated? How and with who?",
            "Rate how fuckable every person here is and why.",
            "What's the kinkiest thing you've done with someone you just met?",
            "Describe the last time you had sex in public.",
            "Have you ever been caught masturbating or having sex? Story time.",
            "What's one sex act you want to try but are scared to ask for?",
            "Show us the dirtiest text you've ever sent.",
            "What's your body count this year?",
            "Have you ever had sex with someone much older or younger?"
        ];
        
        const dares = [
            "Go the rest of the round completely naked.",
            "Let the player who drew this card motorboat you for 15 seconds.",
            "Give the person to your left a very sexual lap dance for 45 seconds.",
            "Kiss the person on your right using tongue for 30 seconds.",
            "Strip down to nothing and do 10 naked jumping jacks.",
            "Let everyone here spank you 5 times each (as hard as they want).",
            "Masturbate in front of the group for one full minute.",
            "Suck on the fingers of the person who drew this card seductively.",
            "Grind on the lap of the player to your right until the next round ends.",
            "Let the group choose where on your body they get to write 'FREE USE'.",
            "French kiss the player across from you passionately for 20 seconds.",
            "Remove all clothing and stay naked for the next 3 rounds.",
            "Let the person who drew this card touch you anywhere they want for 30 seconds.",
            "Perform a striptease for the whole group.",
            "Get on all fours and let the group take turns giving you a playful spank.",
            "Moan your partner's name loudly while describing how you'd fuck them.",
            "Let someone give you a hickey somewhere visible.",
            "Give oral stimulation to the person on your left for 20 seconds (consensual).",
            "Sit on someone's lap completely naked for the next round."
        ];
        
        function createTruthCard() {
            const container = document.createElement('div');
            container.className = `uno-card flipping`;
            container.style.borderColor = '#e30613';
            container.innerHTML = `
                <div class="h-full w-full flex flex-col items-center justify-center p-6 bg-white text-black relative">
                    <div class="absolute top-4 left-4 text-5xl font-black text-red-600">+2</div>
                    <div class="text-[110px] font-black text-red-600 leading-none">+2</div>
                    <div class="mt-4 bg-red-600 text-white text-3xl font-bold px-10 py-2 rounded-2xl">TRUTH</div>
                    <div class="absolute bottom-4 right-4 text-5xl font-black text-red-600 rotate-180">+2</div>
                </div>
            `;
            return container;
        }
        
        function createDareCard() {
            const container = document.createElement('div');
            container.className = `uno-card flipping`;
            container.style.borderColor = '#6b21a8';
            container.innerHTML = `
                <div class="h-full w-full flex flex-col items-center justify-center p-6 bg-black text-white relative">
                    <div class="absolute top-4 left-4 text-5xl font-black text-purple-400">+4</div>
                    <div class="text-[110px] font-black text-purple-400 leading-none">+4</div>
                    <div class="mt-4 bg-purple-600 text-white text-3xl font-bold px-10 py-2 rounded-2xl">DARE</div>
                    <div class="absolute bottom-4 right-4 text-5xl font-black text-purple-400 rotate-180">+4</div>
                </div>
            `;
            return container;
        }
        
        function drawTruth() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            const card = createTruthCard();
            container.appendChild(card);
            
            setTimeout(() => {
                const prompt = truths[Math.floor(Math.random() * truths.length)];
                showResult("🔥 +2 TRUTH 🔥", prompt, 'red');
            }, 900);
        }
        
        function drawDare() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';
            const card = createDareCard();
            container.appendChild(card);
            
            setTimeout(() => {
                const prompt = dares[Math.floor(Math.random() * dares.length)];
                showResult("😈 +4 DARE 😈", prompt, 'purple');
            }, 900);
        }
        
        function showResult(title, prompt, color) {
            const panel = document.getElementById('result-panel');
            panel.classList.remove('hidden');
            
            document.getElementById('effect-type').innerHTML = `
                <span style="color: ${color === 'red' ? '#e30613' : '#a855f7'}">${title}</span>
            `;
            document.getElementById('prompt-text').innerHTML = `"${prompt}"`;
        }
        
        function hideResult() {
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('card-container').innerHTML = `
                <div class="text-center opacity-40 py-24">
                    <div class="text-7xl mb-6">🃏</div>
                    <p>Choose a side to draw</p>
                </div>
            `;
        }
        
        function drawAgain() {
            hideResult();
            // Randomly choose which to draw next for flow
            if (Math.random() > 0.5) {
                drawTruth();
            } else {
                drawDare();
            }
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 't' || e.key === 'T') drawTruth();
            if (e.key === 'd' || e.key === 'D') drawDare();
        });
        
        // Initialize
        window.onload = () => {
            document.getElementById('card-container').innerHTML = `
                <div class="text-center opacity-40 py-24">
                    <div class="text-7xl mb-6">🃏</div>
                    <p class="text-xl">Click a deck to draw</p>
                </div>
            `;
        };
    </script>
</body>
</html>
