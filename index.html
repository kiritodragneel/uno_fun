<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADULT UNO • TRUTH OR DARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        :root {
            --uno-red: #e30613;
            --uno-blue: #0a4fa3;
            --uno-green: #0b9b4a;
            --uno-yellow: #f4d03f;
        }
        
        body {
            font-family: 'Press Start 2P', system-ui;
            background: linear-gradient(135deg, #1a0033, #330033);
            color: white;
            overflow: hidden;
        }
        
        .uno-card {
            width: 280px;
            height: 380px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 8px solid #fff;
            background: white;
            overflow: hidden;
        }
        
        .card-back {
            background: repeating-linear-gradient(
                45deg,
                #000,
                #000 10px,
                #e30613 10px,
                #e30613 20px
            );
        }
        
        .card-inner {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 12px;
        }
        
        .number {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            text-shadow: 4px 4px 0 #000;
        }
        
        .symbol {
            font-size: 5rem;
        }
        
        .deck-stack {
            position: relative;
        }
        
        .deck-card {
            position: absolute;
            transition: all 0.3s ease;
        }
        
        .shuffling .deck-card:nth-child(1) { transform: rotate(-12deg) translate(8px, 8px); }
        .shuffling .deck-card:nth-child(2) { transform: rotate(-6deg) translate(4px, 4px); }
        
        .flipping {
            animation: flipCard 1.2s ease forwards;
        }
        
        @keyframes flipCard {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }
        
        .neon-text {
            text-shadow: 
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #e30613;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-2xl w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-3xl">🃏</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-widest neon-text">ADULT UNO</h1>
                    <p class="text-yellow-300 text-sm tracking-widest">TRUTH OR DARE EDITION 🔥</p>
                </div>
            </div>
            <div class="text-right">
                <div class="bg-black/50 px-4 py-2 rounded-xl text-xs">
                    <span id="cards-left" class="text-lime-400">69</span> CARDS LEFT
                </div>
            </div>
        </div>

        <div class="flex gap-8">
            <!-- Deck -->
            <div class="flex-shrink-0">
                <div onclick="drawCard()" id="deck" 
                     class="deck-stack w-[220px] h-[300px] cursor-pointer active:scale-95 transition-transform">
                    <!-- Stack of cards -->
                    <div id="deck-stack" class="relative w-full h-full">
                        <div class="deck-card uno-card card-back w-[220px] h-[300px] top-0 left-0"></div>
                        <div class="deck-card uno-card card-back w-[220px] h-[300px] top-2 left-2"></div>
                        <div class="deck-card uno-card card-back w-[220px] h-[300px] top-4 left-4"></div>
                    </div>
                </div>
                <button onclick="drawCard()" 
                        class="mt-6 w-full bg-white text-black font-bold py-6 text-xl rounded-2xl hover:bg-yellow-300 transition-colors shadow-xl">
                    SHUFFLE &amp; DRAW
                </button>
                <p class="text-center text-xs text-gray-400 mt-3">18+ • CONSENT IS MANDATORY</p>
            </div>

            <!-- Revealed Card -->
            <div class="flex-1">
                <div id="card-container" class="flex justify-center items-start min-h-[420px]">
                    <!-- Card appears here -->
                </div>

                <!-- Result -->
                <div id="result-panel" class="hidden mt-8 bg-black/70 backdrop-blur-md border-4 border-white rounded-3xl p-8">
                    <div id="effect-type" 
                         class="text-3xl font-bold mb-4 flex items-center gap-3">
                    </div>
                    <div id="prompt-text" 
                         class="text-xl leading-relaxed min-h-[180px] text-pink-200">
                    </div>
                    
                    <div class="flex gap-4 mt-8">
                        <button onclick="drawCard()" 
                                class="flex-1 bg-gradient-to-r from-pink-500 to-purple-600 py-4 rounded-2xl font-bold hover:brightness-110">
                            DRAW NEXT
                        </button>
                        <button onclick="hideCard()" 
                                class="flex-1 border-2 border-white py-4 rounded-2xl font-bold hover:bg-white hover:text-black">
                            HIDE
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="mt-12 text-center text-xs max-w-md mx-auto opacity-70">
            <p class="mb-2">+2 = TRUTH • +4 WILD = DARE</p>
            <p>Other cards = Spicy Command or Pass</p>
            <p class="text-amber-400 mt-4">ALL PLAYERS MUST BE 18+ AND FULLY CONSENTING</p>
        </div>
    </div>

    <script>
        // Tailwind script already included via CDN
        
        const truths = [
            "What's the sluttiest thing you've ever done in public?",
            "Describe the hottest sex you've ever had in full detail.",
            "Have you ever had a threesome? Who, when, and how was it?",
            "What's your biggest sexual regret?",
            "Show the group the last nude you sent or received.",
            "What's your most taboo fantasy that you masturbate to?",
            "Have you ever slept with someone you shouldn't have? Who?",
            "Rate everyone here on how fuckable they are (1-10) and why.",
            "What's the weirdest place you've masturbated?",
            "Have you ever been caught having sex? Tell the full story.",
            "What's your body count? Be honest.",
            "Describe your favorite porn category in detail.",
            "Have you ever faked an orgasm? When and with who?",
            "What's one sex act you've done that you'd never admit to your parents?",
            "Show us your favorite nude photo of yourself."
        ];
        
        const dares = [
            "Remove two pieces of clothing right now.",
            "Give the person to your left a 30-second lap dance.",
            "Kiss the person on your right on the mouth for 15 seconds.",
            "Let someone spank you 10 times (as hard as they want).",
            "Send a nude to the group chat right now.",
            "Masturbate in front of the group for 60 seconds (clothes optional).",
            "Let the group choose one person for you to give oral to (consensual only).",
            "Strip down to your underwear and stay that way for 3 rounds.",
            "Do a naked jumping jack challenge.",
            "Let someone write 'SLUT' on your body with a marker.",
            "French kiss the person across from you for 20 seconds.",
            "Grind on someone's lap for a full minute.",
            "Take off your pants and keep them off.",
            "Let the group take one photo of you in a compromising position.",
            "Moan loudly while describing your last orgasm in detail."
        ];
        
        const spicyCommands = [
            "Everyone must take a shot or remove clothing.",
            "Make eye contact and describe what you'd do to the person on your left.",
            "Pass your phone to the person on your right and let them look at your camera roll.",
            "Do 10 pushups while someone sits on your back.",
            "Whisper your dirtiest fantasy into the ear of the person next to you.",
            "Trade one item of clothing with the person opposite you."
        ];
        
        let deck = [];
        let cardsLeft = 69;
        
        function createDeck() {
            deck = [];
            const colors = ['red', 'blue', 'green', 'yellow'];
            
            // Standard numbers + action cards
            for (let color of colors) {
                for (let i = 0; i < 2; i++) {
                    // Numbers 1-9
                    for (let n = 1; n <= 9; n++) {
                        deck.push({
                            color: color,
                            value: n.toString(),
                            type: 'normal',
                            effect: 'command'
                        });
                    }
                    // +2 cards
                    deck.push({
                        color: color,
                        value: '+2',
                        type: 'draw2',
                        effect: 'truth'
                    });
                }
            }
            
            // Wild cards
            for (let i = 0; i < 6; i++) {
                deck.push({
                    color: 'black',
                    value: 'WILD',
                    type: 'wild',
                    effect: 'random'
                });
            }
            
            // +4 Wilds
            for (let i = 0; i < 6; i++) {
                deck.push({
                    color: 'black',
                    value: '+4',
                    type: 'draw4',
                    effect: 'dare'
                });
            }
            
            // Shuffle
            shuffle(deck);
        }
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        function getRandomColor() {
            const colors = ['#e30613', '#0a4fa3', '#0b9b4a', '#f4d03f'];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        function createCardElement(card) {
            const container = document.createElement('div');
            container.className = `uno-card flipping`;
            container.style.backgroundColor = card.color === 'black' ? '#111' : '#fff';
            container.style.borderColor = card.color === 'black' ? '#fff' : getRandomColor();
            
            let html = `
                <div class="card-inner h-full w-full flex flex-col items-center justify-center p-4 relative" 
                     style="color: ${card.color === 'black' ? '#fff' : '#000'}; background: ${card.color === 'black' ? '#111' : '#fff'}">
                    
                    <!-- Top left -->
                    <div class="absolute top-4 left-4 text-3xl font-black">${card.value}</div>
                    
                    <!-- Center -->
                    <div class="flex flex-col items-center justify-center flex-1">
                        <div class="text-[120px] font-black leading-none tracking-tighter" 
                             style="color: ${card.color === 'black' ? '#fff' : getRandomColor()}">
                            ${card.value}
                        </div>
                        ${card.effect === 'truth' ? 
                            `<div class="text-2xl mt-2 bg-red-600 text-white px-6 py-1 rounded-full">TRUTH</div>` : ''}
                        ${card.effect === 'dare' ? 
                            `<div class="text-2xl mt-2 bg-purple-600 text-white px-6 py-1 rounded-full">DARE</div>` : ''}
                    </div>
                    
                    <!-- Bottom right -->
                    <div class="absolute bottom-4 right-4 text-3xl font-black rotate-180">${card.value}</div>
                </div>
            `;
            
            container.innerHTML = html;
            return container;
        }
        
        function drawCard() {
            if (deck.length === 0) {
                createDeck();
            }
            
            // Shuffle animation
            const deckEl = document.getElementById('deck-stack');
            deckEl.classList.add('shuffling');
            
            setTimeout(() => {
                deckEl.classList.remove('shuffling');
                
                const card = deck.pop();
                cardsLeft = Math.max(0, deck.length);
                document.getElementById('cards-left').textContent = cardsLeft;
                
                // Create and show card
                const container = document.getElementById('card-container');
                container.innerHTML = '';
                const cardElement = createCardElement(card);
                container.appendChild(cardElement);
                
                // Show result after flip
                setTimeout(() => {
                    showResult(card);
                }, 800);
            }, 600);
        }
        
        function showResult(card) {
            const panel = document.getElementById('result-panel');
            panel.classList.remove('hidden');
            
            let effectHTML = '';
            let prompt = '';
            
            if (card.effect === 'truth') {
                prompt = truths[Math.floor(Math.random() * truths.length)];
                effectHTML = `
                    <span class="text-red-500">🔥 TRUTH TIME 🔥</span>
                `;
            } 
            else if (card.effect === 'dare') {
                prompt = dares[Math.floor(Math.random() * dares.length)];
                effectHTML = `
                    <span class="text-purple-500">😈 DARE TIME 😈</span>
                `;
            } 
            else {
                // Random command
                prompt = spicyCommands[Math.floor(Math.random() * spicyCommands.length)];
                effectHTML = `
                    <span class="text-yellow-400">⚡ SPICY COMMAND ⚡</span>
                `;
            }
            
            document.getElementById('effect-type').innerHTML = effectHTML;
            document.getElementById('prompt-text').innerHTML = `<p class="italic">"${prompt}"</p>`;
        }
        
        function hideCard() {
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('card-container').innerHTML = `
                <div class="text-center text-gray-500 py-20">
                    <div class="text-6xl mb-4">🃏</div>
                    <p class="text-sm">Draw a card to begin...</p>
                </div>
            `;
        }
        
        // Initialize
        window.onload = function() {
            createDeck();
            document.getElementById('card-container').innerHTML = `
                <div onclick="drawCard()" 
                     class="uno-card card-back w-[280px] h-[380px] flex items-center justify-center text-6xl cursor-pointer hover:scale-105 transition-transform">
                    <span class="text-white mix-blend-overlay">UNO</span>
                </div>
            `;
            
            // Keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Enter') {
                    drawCard();
                }
            });
        };
    </script>
</body>
</html>
